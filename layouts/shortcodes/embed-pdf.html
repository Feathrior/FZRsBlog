{{- if not ($.Page.Scratch.Get "embed-pdf-count") -}}

<script type="text/javascript" src= '/js/pdf-js/build/pdf.js'></script>

<style>
  .embed-pdf-container {
    position: relative;
    width: 100%;
    height: auto;
    min-height: 20vh;
    background: var(--card-background);
    border-radius: var(--card-border-radius);
    box-shadow: var(--shadow-l1);
    padding: var(--card-padding);
    margin-bottom: var(--spacing-lg);
  }
  
  .pdf-canvas {
    border: 1px solid var(--card-separator-color);
    direction: ltr;
    width: 100%;
    height: auto;
    display: none;
    border-radius: calc(var(--card-border-radius) / 2);
    background: #fff;
  }
  
  [data-scheme="dark"] .pdf-canvas {
    background: #1a1a1a;
  }
  
  #the-canvas {
    border: 1px solid var(--card-separator-color);
    direction: ltr;
    width: 100%;
    height: auto;
    display: none;
    border-radius: calc(var(--card-border-radius) / 2);
    background: #fff;
  }
  
  .pdf-loadingWrapper {
    display: none;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 350px;
  }
  
  .pdf-loading {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 3px solid var(--card-separator-color);
    border-radius: 50%;
    border-top-color: var(--accent-color);
    animation: spin 1s ease-in-out infinite;
    -webkit-animation: spin 1s ease-in-out infinite;
  }
  
  .pdf-overlay {
    position: absolute;
    top: var(--spacing-md);
    right: var(--spacing-md);
    z-index: 10;
  }
  
  .pdf-overlay a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-color-text);
    background-color: var(--accent-color);
    padding: 8px 12px;
    border-radius: var(--tag-border-radius);
    text-decoration: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    box-shadow: var(--shadow-l1);
  }
  
  .pdf-overlay a:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }
  
  .pdf-overlay svg {
    height: 16px;
    width: 16px;
  }
  
  .pdf-paginator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--spacing-md);
    padding: var(--card-padding);
    background: var(--card-background);
    border-radius: var(--card-border-radius);
    box-shadow: var(--shadow-l1);
  }
  
  .pdf-paginator button {
    background: var(--accent-color);
    color: var(--accent-color-text);
    border: none;
    padding: 8px 16px;
    border-radius: var(--tag-border-radius);
    cursor: pointer;
    font-size: 1.4rem;
    font-weight: 500;
    transition: opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: var(--shadow-l1);
    min-width: 80px;
  }
  
  .pdf-paginator button:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: var(--shadow-l2);
  }
  
  .pdf-paginator button:active {
    transform: translateY(0);
  }
  
  .pdf-pagenum,
  .pdf-pagecount {
    color: var(--card-text-color-secondary);
    font-size: 1.5rem;
    font-weight: 600;
  }
  
  .pdf-source {
    color: var(--accent-color);
    text-decoration: none;
    font-size: 1.4rem;
    padding: 6px 12px;
    border: 1px solid var(--card-separator-color);
    border-radius: var(--tag-border-radius);
    transition: all 0.2s ease;
  }
  
  .pdf-source:hover {
    background: rgba(var(--link-background-color), var(--link-background-opacity));
    border-color: var(--accent-color);
  }
  
  @keyframes spin {
    to { -webkit-transform: rotate(360deg); }
  }
  @-webkit-keyframes spin {
    to { -webkit-transform: rotate(360deg); }
  }
  </style>
{{- end -}}

{{- $.Page.Scratch.Add "embed-pdf-count" 1 -}}
<div class="embed-pdf-container" id="embed-pdf-container-{{ substr (.Get "url" | md5) 0 8 }}">
    <div class="pdf-loadingWrapper" id="pdf-loadingWrapper-{{ substr (.Get "url" | md5) 0 8 }}">
        <div class="pdf-loading" id="pdf-loading-{{ substr (.Get "url" | md5) 0 8 }}"></div>
    </div>
    <div class="pdf-overlay">
      <a href="{{ .Get "url" }}" aria-label="Download" download>
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18">
            <path d="M9 13c.3 0 .5-.1.7-.3L15.4 7 14 5.6l-4 4V1H8v8.6l-4-4L2.6 7l5.7 5.7c.2.2.4.3.7.3zm-7 2h14v2H2z" />
        </svg>
      </a>
    </div>
    <canvas class="pdf-canvas" id="pdf-canvas-{{ substr (.Get "url" | md5) 0 8 }}"></canvas>
</div>

<div class="pdf-paginator" id="pdf-paginator-{{ substr (.Get "url" | md5) 0 8 }}">
    <button id="pdf-prev-{{ substr (.Get "url" | md5) 0 8 }}">Previous</button>
    <button id="pdf-next-{{ substr (.Get "url" | md5) 0 8 }}">Next</button>
    <span>
      <span class="pdf-pagenum" id="pdf-pagenum-{{ substr (.Get "url" | md5) 0 8 }}"></span> / <span class="pdf-pagecount" id="pdf-pagecount-{{ substr (.Get "url" | md5) 0 8 }}"></span>
    </span>
    <a class="pdf-source" id="pdf-source-{{ substr (.Get "url" | md5) 0 8 }}" href="{{ .Get "url" }}">PDF</a>
</div>

<noscript>
View the PDF file <a class="pdf-source" id="pdf-source-noscript-{{ substr (.Get "url" | md5) 0 8 }}" href="{{ .Get "url" }}">here</a>.
</noscript>

<script type="text/javascript">
    (function(){
    var url = encodeURI('{{ .Get "url" }}');

    var hidePaginator = "{{ .Get "hidePaginator" }}" === "true";
    var hideLoader = "{{ .Get "hideLoader" }}" === "true";
    var selectedPageNum = parseInt("{{ .Get "renderPageNum" }}") || 1;

    var pdfjsLib = window['pdfjs-dist/build/pdf'];

    pdfjsLib.GlobalWorkerOptions.workerSrc = '/js/pdf-js/build/pdf.worker.js';

    var pdfDoc = null,
        pageNum = selectedPageNum,
        pageRendering = false,
        pageNumPending = null,
        scale = 3,
        canvas = document.getElementById('pdf-canvas-{{ substr (.Get "url" | md5) 0 8 }}'),
        ctx = canvas.getContext('2d'),
        paginator = document.getElementById("pdf-paginator-{{ substr (.Get "url" | md5) 0 8 }}"),
        loadingWrapper = document.getElementById('pdf-loadingWrapper-{{ substr (.Get "url" | md5) 0 8 }}');

    showPaginator();
    showLoader();

    function renderPage(num) {
      pageRendering = true;
      pdfDoc.getPage(num).then(function(page) {
        var viewport = page.getViewport({scale: scale});
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        var renderContext = {
          canvasContext: ctx,
          viewport: viewport
        };
        var renderTask = page.render(renderContext);

        renderTask.promise.then(function() {
          pageRendering = false;
          showContent();

          if (pageNumPending !== null) {
            renderPage(pageNumPending);
            pageNumPending = null;
          }
        });
      });

      document.getElementById('pdf-pagenum-{{ substr (.Get "url" | md5) 0 8 }}').textContent = num;
    }

    function showContent() {
      loadingWrapper.style.display = 'none';
      canvas.style.display = 'block';
    }

    function showLoader() {
      if(hideLoader) return
      loadingWrapper.style.display = 'flex';
      canvas.style.display = 'none';
    }

    function showPaginator() {
      if(hidePaginator) return
      paginator.style.display = 'block';
    }

    function queueRenderPage(num) {
      if (pageRendering) {
        pageNumPending = num;
      } else {
        renderPage(num);
      }
    }

    function onPrevPage() {
      if (pageNum <= 1) {
        return;
      }
      pageNum--;
      queueRenderPage(pageNum);
    }
    document.getElementById('pdf-prev-{{ substr (.Get "url" | md5) 0 8 }}').addEventListener('click', onPrevPage);

    function onNextPage() {
      if (pageNum >= pdfDoc.numPages) {
        return;
      }
      pageNum++;
      queueRenderPage(pageNum);
    }
    document.getElementById('pdf-next-{{ substr (.Get "url" | md5) 0 8 }}').addEventListener('click', onNextPage);

    pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
      pdfDoc = pdfDoc_;
      var numPages = pdfDoc.numPages;
      document.getElementById('pdf-pagecount-{{ substr (.Get "url" | md5) 0 8 }}').textContent = numPages;

      if(pageNum > numPages) {
        pageNum = numPages
      }

      renderPage(pageNum);
    });
    })();
</script>
